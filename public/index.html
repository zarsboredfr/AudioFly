<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AudioFly</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-shell simple">
    <main class="content">
      <div class="page-topbar">
        <div id="backendStatus" class="status-chip status-warning">
          <span class="status-dot"></span>
          <span id="backendStatusText">Checking backend...</span>
        </div>
      </div>
      <div class="card">
        <div class="badge">AudioFly</div>
        <h1>Download YouTube audio as MP3</h1>
        <p>Paste a YouTube link and get an MP3 file instantly.</p>
        <form id="downloadForm" action="/download" method="get" target="_blank">
          <input id="videoUrl" name="url" type="url" placeholder="https://www.youtube.com/watch?v=..." required>
          <button id="downloadButton" type="submit">Download MP3</button>
        </form>
        <p class="note">Only YouTube watch URLs and youtu.be links are supported. Some videos may require browser cookies if YouTube blocks automated access.</p>
        <p id="status" class="status"></p>
        <div id="debugOutput" class="debug-output"></div>
      </div>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
